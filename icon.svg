<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#ffffff" rx="20"/>

  <!-- YouTube Shorts icon (simplified play button in rounded rectangle) -->
  <g transform="translate(32, 24)">
    <!-- Rounded rectangle representing Shorts -->
    <rect x="0" y="0" width="64" height="80" rx="8" fill="#FF0000"/>

    <!-- Play triangle -->
    <polygon points="25,25 25,55 45,40" fill="#FFFFFF"/>
  </g>

  <!-- Red X/Cross over it -->
  <line x1="20" y1="20" x2="108" y2="108" stroke="#FF0000" stroke-width="12" stroke-linecap="round"/>
  <line x1="108" y1="20" x2="20" y2="108" stroke="#FF0000" stroke-width="12" stroke-linecap="round"/>

  <!-- White outline for X to make it more visible -->
  <line x1="20" y1="20" x2="108" y2="108" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="108" y1="20" x2="20" y2="108" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

  <!-- Red X on top -->
  <line x1="20" y1="20" x2="108" y2="108" stroke="#FF0000" stroke-width="6" stroke-linecap="round"/>
  <line x1="108" y1="20" x2="20" y2="108" stroke="#FF0000" stroke-width="6" stroke-linecap="round"/>
</svg>
